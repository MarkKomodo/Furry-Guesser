name: Convert Question Bank
on:
  push:
    paths:
      - 'questions.txt' # Only runs when you change this file
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run Python Compiler
        run: python compiler.py
      - name: Commit JSON
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data.json
          git commit -m "Auto-update question tree" || exit 0
          git push
